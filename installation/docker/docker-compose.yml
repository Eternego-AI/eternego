# Eternego — single-service setup, configure your persona's model in the UI.
#
# Quick start (normal):
#   docker compose -f eternego.compose.yml up -d
#
# Quick start with debug:
#   docker compose -f eternego.compose.yml up --force-recreate
#   (just set DEBUG=true in the environment section below first)
#
# Open:
#   http://localhost:5000          → Dashboard
#   http://localhost:6080/vnc.html → Persona desktop (when START_DESKTOP=true)

services:
  eternego:
    image: ghcr.io/eternego-ai/eternego:latest
    # image: ghcr.io/eternego-ai/eternego:full   # for training support
    restart: unless-stopped

    environment:
      # Point at Ollama on the host. If you have it installed natively (the
      # common path), make sure it's listening on all interfaces — set
      # OLLAMA_HOST=0.0.0.0:11434 in its environment. To use the bundled
      # ollama service below instead, change this to http://ollama:11434.
      # Frontier-only personas (Anthropic / OpenAI / etc.) ignore this entirely.
      OLLAMA_BASE_URL: http://host.docker.internal:11434

      # === Debug mode ===
      # Set to "true" to enable debug logging / verbose output.
      # Very useful for troubleshooting, even in production environments.
      DEBUG: "false"

      # === Desktop / X11 ===
      # Set to "false" for channels-only (headless) deployments
      START_DESKTOP: "true"
      # XVFB_RESOLUTION: 1920x1080x24

    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "5000:5000"   # Dashboard + OpenAI-compatible API
      - "6080:6080"   # noVNC desktop viewer

    volumes:
      - ${ETERNEGO_HOME:-${HOME}/.eternego}:/data
  # Uncomment to run Ollama as a sibling container instead of using one on the
  # host. Switch OLLAMA_BASE_URL above to http://ollama:11434 at the same time.
  # On Linux with NVIDIA: uncomment the deploy block to give Ollama GPU access.
  # ollama:
  #   image: ollama/ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

# volumes:
#   ollama-data:

    # Optional: Uncomment to force debug mode via command override
    # command: ["--debug", "daemon"]