<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Eternego{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .sig-row { animation: fadeSlideIn 0.15s ease both; }
    .feed-scroll::-webkit-scrollbar       { width: 3px; }
    .feed-scroll::-webkit-scrollbar-track { background: transparent; }
    .feed-scroll::-webkit-scrollbar-thumb { background: #3f3f5a; border-radius: 2px; }
  </style>
</head>
<body class="min-h-full bg-zinc-950 text-zinc-100 antialiased">

  <header class="border-b border-zinc-800/60 px-6 h-14 flex items-center gap-4">
    <a href="/dashboard" class="flex items-center gap-2.5 hover:opacity-80 transition-opacity">
      <img src="/assets/eternego-icon.svg" class="w-7 h-7 rounded-lg flex-shrink-0" alt="Eternego">
      <span class="text-xs font-bold tracking-widest uppercase">Etern<span style="color:#E8A838">ego</span></span>
    </a>
    <span class="text-xs text-zinc-700 italic flex-1">the eternal i</span>

    <div id="ws-badge" class="flex items-center gap-1.5 text-xs font-mono px-3 py-1 rounded-full border border-zinc-800 bg-zinc-900 text-zinc-500 transition-colors duration-300">
      <span id="ws-dot" class="w-1.5 h-1.5 rounded-full bg-zinc-600 transition-colors duration-300"></span>
      <span id="ws-label">connecting</span>
    </div>
    <a href="/dashboard/logs"
       class="text-xs px-3 py-1.5 rounded-lg border border-zinc-800 hover:border-zinc-600 text-zinc-500 hover:text-zinc-300 font-mono transition-colors">
      logs
    </a>
    <button id="sig-toggle-btn" onclick="toggleSidebar()"
            class="text-xs px-3 py-1.5 rounded-lg border border-zinc-800 hover:border-zinc-600 text-zinc-500 hover:text-zinc-300 font-mono transition-colors">
      signals
    </button>

    <button onclick="openModal('modal-create')"
            class="text-xs px-3.5 py-1.5 rounded-lg bg-amber-600 hover:bg-amber-500 text-white font-medium transition-colors">
      + Create
    </button>
    <button onclick="openModal('modal-migrate')"
            class="text-xs px-3.5 py-1.5 rounded-lg border border-zinc-700 hover:border-zinc-600 text-zinc-400 hover:text-zinc-200 font-medium transition-colors">
      Migrate
    </button>
  </header>

  <main id="main-content" class="p-6 transition-all duration-200">
    {% block content %}{% endblock %}
  </main>

  <!-- Signals sidebar -->
  <aside id="sig-sidebar"
         class="fixed top-14 right-0 h-[calc(100vh-56px)] w-64 bg-zinc-900/95 backdrop-blur border-l border-zinc-800 flex flex-col z-40 transition-transform duration-200">
    <div class="flex items-center justify-between px-4 py-3 border-b border-zinc-800 flex-shrink-0">
      <span class="text-xs font-mono text-zinc-500 uppercase tracking-widest">Signals</span>
      <button onclick="toggleSidebar()" class="text-zinc-600 hover:text-zinc-300 transition-colors text-lg leading-none">×</button>
    </div>
    <div id="sig-feed" class="flex-1 overflow-y-auto feed-scroll px-3 py-3 flex flex-col gap-1.5">
      <p id="sig-empty" class="text-xs font-mono text-zinc-700 text-center mt-4">No signals yet.</p>
    </div>
  </aside>

  {% include "components/create_modal.html" %}
  {% include "components/migrate_modal.html" %}

  {% block modals %}{% endblock %}

  <script>
    // ── Modals ────────────────────────────────────────────────────────────
    function openModal(id) {
      document.getElementById(id).classList.remove('hidden');
    }
    function closeModal(id) {
      document.getElementById(id).classList.add('hidden');
    }
    document.addEventListener('click', e => {
      if (e.target.hasAttribute('data-backdrop')) closeModal(e.target.id);
    });

    // ── WebSocket badge ───────────────────────────────────────────────────
    function setWsBadge(state) {
      const badge = document.getElementById('ws-badge');
      const dot   = document.getElementById('ws-dot');
      const label = document.getElementById('ws-label');
      const cfg = {
        connecting:   { text: 'text-zinc-500',   border: 'border-zinc-800',      dot: 'bg-zinc-600',    label: 'connecting'    },
        live:         { text: 'text-emerald-400', border: 'border-emerald-900/50', dot: 'bg-emerald-400', label: 'live'          },
        reconnecting: { text: 'text-red-400',     border: 'border-red-900/50',    dot: 'bg-red-500',     label: 'reconnecting…' },
      }[state];
      badge.className = `flex items-center gap-1.5 text-xs font-mono px-3 py-1 rounded-full border bg-zinc-900 transition-colors duration-300 ${cfg.text} ${cfg.border}`;
      dot.className   = `w-1.5 h-1.5 rounded-full transition-colors duration-300 ${cfg.dot}`;
      label.textContent = cfg.label;
    }

    // ── Signals sidebar ───────────────────────────────────────────────────
    const _sidebarOpen = localStorage.getItem('sig-sidebar') !== 'closed';
    const _sidebar     = document.getElementById('sig-sidebar');
    const _main        = document.getElementById('main-content');

    function applySidebar(open) {
      _sidebar.style.transform = open ? 'translateX(0)' : 'translateX(100%)';
      _main.style.paddingRight = open ? '17rem' : '';
      localStorage.setItem('sig-sidebar', open ? 'open' : 'closed');
    }

    function toggleSidebar() { applySidebar(_sidebar.style.transform === 'translateX(100%)'); }

    applySidebar(_sidebarOpen);

    const _typeColour = { Plan: 'text-amber-400', Event: 'text-emerald-400', Message: 'text-sky-400' };

    function pushSignal(signal) {
      document.getElementById('sig-empty')?.remove();
      const feed = document.getElementById('sig-feed');
      const row  = document.createElement('div');
      row.className = 'sig-row flex flex-col gap-0.5 py-1.5 px-2 rounded-lg bg-zinc-800/50 border border-zinc-800/80';

      const top = document.createElement('div');
      top.className = 'flex items-center gap-1.5';

      const tag = document.createElement('span');
      tag.className = `text-[10px] font-mono ${_typeColour[signal.type] || 'text-zinc-500'}`;
      tag.textContent = (signal.type || '').toLowerCase();

      const title = document.createElement('span');
      title.className = 'text-xs text-zinc-300 truncate flex-1';
      title.textContent = signal.title || '';

      top.appendChild(tag);
      top.appendChild(title);
      row.appendChild(top);

      const persona = signal.details?.persona;
      const personaId = persona?.id ?? persona;
      if (personaId && typeof personaId === 'string') {
        const sub = document.createElement('span');
        sub.className = 'text-[10px] font-mono text-zinc-600 truncate';
        sub.textContent = personaId.slice(0, 8) + '…';
        row.appendChild(sub);
      }

      feed.appendChild(row);
      // keep last 100 entries
      while (feed.children.length > 100) feed.removeChild(feed.firstChild);
      feed.scrollTop = feed.scrollHeight;
    }

    // ── WebSocket ─────────────────────────────────────────────────────────
    function wsConnect() {
      const ws = new WebSocket(`ws://${location.host}/ws`);
      ws.onopen    = () => setWsBadge('live');
      ws.onclose   = () => { setWsBadge('reconnecting'); setTimeout(wsConnect, 3000); };
      ws.onerror   = () => ws.close();
      ws.onmessage = e => {
        try {
          const signal = JSON.parse(e.data);
          pushSignal(signal);
          if (typeof onSignal === 'function') onSignal(signal);
        } catch {}
      };
    }

    wsConnect();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
