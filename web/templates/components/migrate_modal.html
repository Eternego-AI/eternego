<div id="modal-migrate" data-backdrop
     class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
  <div class="bg-zinc-900 border border-zinc-800 rounded-2xl w-full max-w-md shadow-2xl"
       onclick="event.stopPropagation()">

    <div class="flex items-center justify-between px-5 py-4 border-b border-zinc-800">
      <h2 class="font-semibold text-zinc-100">Migrate Persona</h2>
      <button onclick="closeModal('modal-migrate')"
              class="text-zinc-600 hover:text-zinc-300 text-2xl leading-none transition-colors">×</button>
    </div>

    <form id="form-migrate" class="p-5 flex flex-col gap-4">
      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">Diary path</label>
        <input name="diary_path" required type="text" placeholder="/path/to/persona/diary"
               class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-700 focus:outline-none focus:border-amber-500 transition-colors">
      </div>

      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">Recovery phrase</label>
        <input name="phrase" required type="password" placeholder="your secret recovery phrase"
               class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-700 focus:outline-none focus:border-amber-500 transition-colors">
      </div>

      <div>
        <label class="block text-xs font-medium text-zinc-400 mb-1.5">Base model</label>
        <input name="model" required type="text" placeholder="e.g. llama3.2"
               class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-zinc-100 placeholder-zinc-700 focus:outline-none focus:border-amber-500 transition-colors">
      </div>

      <div id="migrate-error"
           class="hidden text-xs text-red-400 bg-red-950 border border-red-900/50 rounded-lg px-3 py-2"></div>

      <div class="flex justify-end gap-3 pt-1">
        <button type="button" onclick="closeModal('modal-migrate')"
                class="text-sm px-4 py-2 rounded-lg text-zinc-500 hover:text-zinc-200 transition-colors">
          Cancel
        </button>
        <button type="submit" id="btn-migrate"
                class="text-sm px-4 py-2 rounded-lg bg-amber-600 hover:bg-amber-500 text-white font-medium transition-colors disabled:opacity-50">
          Migrate
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  document.getElementById('form-migrate').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btn-migrate');
    const err = document.getElementById('migrate-error');
    const data = Object.fromEntries(new FormData(e.target));

    btn.textContent = 'Migrating…';
    btn.disabled    = true;
    err.classList.add('hidden');

    try {
      const res  = await fetch('/api/persona/migrate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const body = await res.json();
      if (!res.ok) throw new Error(body.detail || 'Migration failed.');
      closeModal('modal-migrate');
      e.target.reset();
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.remove('hidden');
    } finally {
      btn.textContent = 'Migrate';
      btn.disabled    = false;
    }
  });
</script>
