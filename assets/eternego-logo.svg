<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <!-- Gradient for the main symbol -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#1B3A5C"/>
      <stop offset="100%" style="stop-color:#0A1628"/>
    </linearGradient>
    
    <!-- Accent gradient - warm amber/gold for the "consciousness spark" -->
    <linearGradient id="sparkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A838"/>
      <stop offset="40%" style="stop-color:#F0C060"/>
      <stop offset="100%" style="stop-color:#D4922A"/>
    </linearGradient>
    
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="320" fill="#FAFAF8"/>
  
  <!-- === SYMBOL: Infinity loop with a consciousness node === -->
  <g transform="translate(130, 120)">
    <!-- Infinity path - organic, slightly imperfect feel -->
    <path d="M 0,40 
             C 0,-15 35,-30 55,-30 
             C 80,-30 95,5 110,25 
             C 125,45 140,70 165,70 
             C 190,70 220,55 220,40 
             C 220,25 190,10 165,10 
             C 140,10 125,35 110,55 
             C 95,75 80,110 55,110 
             C 35,110 0,95 0,40 Z" 
          fill="none" 
          stroke="url(#mainGrad)" 
          stroke-width="5" 
          stroke-linecap="round"/>
    
    <!-- The crossing point - consciousness node / "ego" -->
    <circle cx="110" cy="40" r="10" fill="url(#sparkGrad)" filter="url(#glow)"/>
    
    <!-- Inner spark -->
    <circle cx="110" cy="40" r="4" fill="#FFF8E8" opacity="0.9"/>
    
    <!-- Radiating lines from center - subtle knowledge transfer -->
    <g stroke="#E8A838" stroke-width="1" opacity="0.4">
      <line x1="110" y1="28" x2="110" y2="18"/>
      <line x1="110" y1="52" x2="110" y2="62"/>
      <line x1="98" y1="40" x2="88" y2="40"/>
      <line x1="122" y1="40" x2="132" y2="40"/>
      <line x1="101" y1="31" x2="95" y2="25"/>
      <line x1="119" y1="49" x2="125" y2="55"/>
      <line x1="119" y1="31" x2="125" y2="25"/>
      <line x1="101" y1="49" x2="95" y2="55"/>
    </g>
    
    <!-- Small orbit dots - representing accumulating memory -->
    <circle cx="55" cy="-25" r="2.5" fill="#1B3A5C" opacity="0.5"/>
    <circle cx="165" cy="72" r="2" fill="#1B3A5C" opacity="0.4"/>
    <circle cx="28" cy="75" r="1.8" fill="#1B3A5C" opacity="0.3"/>
    <circle cx="192" cy="18" r="2.2" fill="#1B3A5C" opacity="0.35"/>
  </g>
  
  <!-- === WORDMARK === -->
  <g transform="translate(390, 100)">
    <!-- "Etern" in deep navy -->
    <text font-family="'Cormorant Garamond', 'Playfair Display', 'Georgia', serif" 
          font-size="72" 
          font-weight="600" 
          fill="#0A1628" 
          letter-spacing="2">
      <tspan>Etern</tspan>
    </text>
    <!-- "ego" in warm gold accent -->
    <text font-family="'Cormorant Garamond', 'Playfair Display', 'Georgia', serif" 
          font-size="72" 
          font-weight="600" 
          fill="url(#sparkGrad)" 
          letter-spacing="2"
          x="215">
      <tspan>ego</tspan>
    </text>
  </g>
  
  <!-- Tagline -->
  <text font-family="'DM Sans', 'Helvetica Neue', sans-serif" 
        font-size="15" 
        fill="#6B7B8D" 
        letter-spacing="5"
        text-transform="uppercase"
        x="392" y="148">
    THE ETERNAL I
  </text>
  
  <!-- Subtle decorative line under tagline -->
  <line x1="392" y1="160" x2="545" y2="160" stroke="#E8A838" stroke-width="0.8" opacity="0.5"/>
  
  <!-- Subtext: mission statement, very light -->
  <text font-family="'DM Sans', 'Helvetica Neue', sans-serif" 
        font-size="12.5" 
        fill="#8A96A3" 
        letter-spacing="0.5"
        x="392" y="195">
    AI that learns to be you
  </text>
</svg>
