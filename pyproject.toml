[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "eternego"
version = "0.1.0"
description = "AI personas that live on your hardware"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27.0",
    "fastapi>=0.100.0",
    "uvicorn>=0.20.0",
    "websockets>=12.0",
    "jinja2>=3.0.0",
    "python-dotenv>=1.0.0",
    "pywin32>=305; sys_platform == 'win32'",
]

[project.scripts]
eternego = "cli.main:main"

[tool.setuptools]
py-modules = ["service", "heart"]

[tool.setuptools.packages.find]
where = ["."]
include = ["application*", "cli*", "config*", "web*"]
