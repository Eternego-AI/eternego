name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos
          - os: windows-latest
            name: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install git+https://github.com/Eternego-AI/test-runner.git

      - name: Install secret-tool and keyring (Linux)
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-tools gnome-keyring dbus-x11

      - name: Start keyring daemon (Linux)
        if: matrix.name == 'linux'
        run: |
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV
          echo -n "test" | gnome-keyring-daemon --unlock --components=secrets

      - name: Set up keychain (macOS)
        if: matrix.name == 'macos'
        run: |
          security create-keychain -p test login.keychain-db
          security default-keychain -s login.keychain-db
          security unlock-keychain -p test login.keychain-db
          security set-keychain-settings -t 0 login.keychain-db

      - name: Run tests
        run: test-runner
        timeout-minutes: 10
